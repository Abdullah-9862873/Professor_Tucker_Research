# Model Hyperparameters Configuration
# Used by safety_trainer.py for training configuration

model:
  base_model: "yolov8n.pt"
  num_classes: 3
  input_size: [320, 320]
  confidence_threshold: 0.5
  iou_threshold: 0.45
  
  # Safety head configuration
  safety_head:
    hidden_dim: 512
    dropout: 0.3
    
  # Attention configuration (optional)
  use_attention: false
  attention_heads: 4

optimizer:
  type: "AdamW"
  learning_rate: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eps: 1.0e-08
  
  # Learning rate scheduler
  scheduler:
    type: "cosine"
    warmup_epochs: 2
    warmup_lr_start: 1.0e-05
    min_lr: 1.0e-06
    
loss:
  classification:
    type: "CrossEntropyLoss"
    weight: null
    ignore_index: -100
    
  proximity:
    type: "MSELoss"
    weight: 0.1
    
training:
  batch_size: 4
  epochs: 5
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
    
  gradient_clipping:
    enabled: true
    max_norm: 1.0
    
  checkpoint:
    save_every: 1
    save_best: true
    monitor: "val_f1"
    mode: "max"

evaluation:
  batch_size: 8
  metrics:
    - "precision"
    - "recall"
    - "f1"
    - "accuracy"
    
  confidence_intervals:
    enabled: true
    n_bootstrap: 1000
    confidence_level: 0.95
    
  baseline_comparison:
    enabled: true
    baseline_models:
      - "yolov8n"
      - "yolov8s"
      
  k_fold_cv:
    enabled: false
    n_splits: 5

inference:
  batch_size: 1
  device: "cpu"
  tta: false  # Test-time augmentation
  half_precision: false